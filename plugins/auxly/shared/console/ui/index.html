<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auxly Execute</title>
    <style>
:root {
  color-scheme: dark;
  --teal: #29c2cf; --blue: #4f93e6; --purple: #8b6fd0; --green: #2dd4a7;
  --grad: linear-gradient(120deg, var(--teal) 0%, var(--blue) 48%, var(--purple) 100%);
  --bg: #0c1119; --bg-2: #0f1623; --panel: #141c2b; --panel-2: #1a2335; --raised: #202c43;
  --border: #263149; --border-soft: #1d2740; --ink: #e8eef9; --muted: #8a97af; --muted-2: #66728a;
  --risk-ink: #ff8585; --risk-bg: rgba(255,99,99,.12); --risk-bd: rgba(255,99,99,.4);
  --warn-ink: #f5c069; --warn-bg: rgba(245,180,84,.12); --warn-bd: rgba(245,180,84,.4);
  --ok-ink: #4fe0b6; --ok-bg: rgba(45,212,167,.12); --ok-bd: rgba(45,212,167,.35);
  --run-ink: #6fb0ff;
  --radius: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --mono: "SF Mono","JetBrains Mono",ui-monospace, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
body { margin:0; font-family:var(--font); color:var(--ink); min-height:100vh;
  background: radial-gradient(900px 500px at 12% -8%, rgba(79,147,230,.14), transparent 60%),
              radial-gradient(800px 500px at 100% 0%, rgba(139,111,208,.14), transparent 55%), var(--bg);
  -webkit-font-smoothing: antialiased; }
.app { max-width: 1180px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; display:flex; flex-direction:column; gap:1.1rem; }

/* Header */
.hero { position:relative; overflow:hidden; border-radius:var(--radius); border:1px solid var(--border);
  background: linear-gradient(120deg, rgba(41,194,207,.16), rgba(139,111,208,.16)), var(--panel); padding:1.1rem 1.3rem;
  display:flex; flex-direction:column; gap:0.9rem; }
.hero::before { content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--grad); }
.hero-top { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:0.8rem; flex:1 1 auto; }
.brand-logo { width:50px; height:50px; border-radius:13px; flex:none; background:radial-gradient(circle at 30% 25%,#fff,#eef3fb); padding:6px; box-shadow:0 6px 18px rgba(0,0,0,.4); }
.brand-text { display:flex; flex-direction:column; gap:3px; }
.brand-mark { font-size:1.5rem; font-weight:750; line-height:1; }
.brand-mark span { background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.brand-meta { display:flex; gap:0.7rem; font-size:0.78rem; color:var(--muted); flex-wrap:wrap; }
.brand-meta b { color:var(--ink); font-weight:600; }
.hero-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.45rem; }
.run-badge { font-size:0.7rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:0.34rem 0.8rem; border-radius:999px; border:1px solid var(--border); background:var(--panel-2); color:var(--muted); display:inline-flex; align-items:center; gap:0.4rem; }
.run-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--muted-2); }
.run-badge[data-status="running"] { color:var(--run-ink); border-color:rgba(79,147,230,.4); }
.run-badge[data-status="running"] .dot { background:var(--run-ink); animation:blink 1.3s ease-in-out infinite; }
.run-badge[data-status="blocked"] { color:var(--risk-ink); border-color:var(--risk-bd); }
.run-badge[data-status="blocked"] .dot { background:var(--risk-ink); animation:blink .8s ease-in-out infinite; }
.run-badge[data-status="complete"] { color:var(--ok-ink); border-color:var(--ok-bd); }
.run-badge[data-status="complete"] .dot { background:var(--ok-ink); }
.run-badge[data-status="failed"] { color:var(--risk-ink); border-color:var(--risk-bd); }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.conn { font-size:0.72rem; color:var(--muted); display:inline-flex; align-items:center; gap:0.4rem; }
.conn .dot { width:7px; height:7px; border-radius:50%; background:var(--muted-2); }
.conn[data-ok="1"] .dot { background:var(--green); animation:blink 1.3s ease-in-out infinite; }

/* Progress bar */
.progress-wrap { display:flex; flex-direction:column; gap:0.4rem; }
.progress-top { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--muted); }
.progress-top b { color:var(--ink); }
.bar { height:12px; border-radius:999px; background:var(--bg-2); border:1px solid var(--border); overflow:hidden; }
.bar > span { display:block; height:100%; width:0; background:var(--grad); transition:width .4s ease; }

/* Notifications */
.notifs { display:flex; flex-direction:column; gap:0.7rem; }
.notif { border-radius:14px; border:1px solid var(--border); padding:0.85rem 1rem; }
.notif .n-head { display:flex; align-items:center; gap:0.5rem; }
.n-tag { font-size:0.62rem; font-weight:850; letter-spacing:.07em; text-transform:uppercase; padding:0.2rem 0.5rem; border-radius:7px; }
.n-subject { font-weight:700; font-size:0.95rem; }
.n-detail { color:var(--muted); font-size:0.85rem; margin-top:0.35rem; }
.n-slice { font-family:var(--mono); font-size:0.72rem; color:var(--muted-2); }
.notif.blocker { background:var(--risk-bg); border-color:var(--risk-bd); }
.notif.blocker .n-tag { background:var(--risk-ink); color:#240606; }
.notif.blocker .n-subject { color:var(--risk-ink); }
.notif.warning { background:var(--warn-bg); border-color:var(--warn-bd); }
.notif.warning .n-tag { background:var(--warn-ink); color:#2a1c04; }
.notif.warning .n-subject { color:var(--warn-ink); }
.notif.resolved { opacity:.55; }
.resolve-row { display:flex; gap:0.5rem; margin-top:0.6rem; }
.resolve-row textarea { flex:1; min-height:42px; resize:vertical; border-radius:9px; border:1px solid var(--risk-bd); background:var(--bg-2); color:var(--ink); padding:0.45rem 0.6rem; font-family:var(--font); font-size:0.85rem; }
.btn { border:none; cursor:pointer; font-weight:700; font-size:0.8rem; padding:0.5rem 0.95rem; border-radius:9px; color:#06121f; }
.btn.resolve { background:linear-gradient(120deg,#ff8585,#e0985a); color:#240606; }
.btn.dismiss { background:var(--raised); color:var(--ink); border:1px solid var(--border); }
.btn:hover { filter:brightness(1.08); }
.resolution-note { margin-top:0.5rem; font-size:0.8rem; color:var(--ok-ink); }
.empty-hint { color:var(--muted-2); font-size:0.82rem; font-style:italic; }

/* Agents */
.agents { padding:0.7rem 0.9rem; display:flex; flex-wrap:wrap; gap:0.6rem; }
.agent { display:flex; align-items:center; gap:0.55rem; padding:0.5rem 0.75rem; border-radius:12px; border:1px solid var(--border); background:var(--panel-2); min-width:200px; }
.agent .adot { width:9px; height:9px; border-radius:50%; background:var(--muted-2); flex:none; }
.agent[data-status="active"] { border-color:rgba(45,212,167,.4); box-shadow:inset 0 0 0 1px rgba(45,212,167,.18); }
.agent[data-status="active"] .adot { background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1.1s infinite; }
.agent[data-status="done"] .adot { background:var(--blue); }
.agent-main { display:flex; flex-direction:column; gap:2px; min-width:0; }
.agent-name { font-weight:650; font-size:0.86rem; display:flex; align-items:center; gap:0.35rem; }
.agent-model { font-family:var(--mono); font-size:0.72rem; color:var(--muted); }
.agent-meta { display:flex; align-items:center; gap:0.4rem; margin-left:auto; }
.atag { font-size:0.58rem; font-weight:850; letter-spacing:.06em; text-transform:uppercase; padding:0.18rem 0.45rem; border-radius:6px; }
.atag.active { background:var(--ok-bg); color:var(--ok-ink); border:1px solid var(--ok-bd); }
.atag.idle { background:var(--raised); color:var(--muted); }
.atag.done { background:rgba(79,147,230,.12); color:var(--run-ink); }
.arole { font-size:0.58rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted-2); border:1px solid var(--border); border-radius:6px; padding:1px 5px; }
.agent-current { font-size:0.72rem; color:var(--run-ink); font-family:var(--mono); }
.agent-current:empty { display:none; }

/* Phases / slices */
.panel { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.panel-header { padding:0.85rem 1.1rem; border-bottom:1px solid var(--border-soft); background:var(--panel-2); display:flex; justify-content:space-between; align-items:center; }
.panel-header h2 { margin:0; font-size:0.98rem; font-weight:700; display:flex; align-items:center; gap:0.5rem; }
.panel-header h2::before { content:''; width:9px; height:9px; border-radius:3px; background:var(--grad); }
.panel-sub { font-size:0.74rem; color:var(--muted); }
.phases { padding:0.4rem 0.6rem; }
.phase { padding:0.65rem 0.6rem; border-bottom:1px solid var(--border-soft); }
.phase:last-child { border-bottom:none; }
.phase-head { display:flex; align-items:center; gap:0.6rem; }
.phase-name { font-weight:700; font-size:0.92rem; }
.phase-id { font-family:var(--mono); font-size:0.72rem; color:var(--muted-2); border:1px solid var(--border); border-radius:6px; padding:1px 6px; }
.phase-status { margin-left:auto; font-size:0.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; padding:0.18rem 0.5rem; border-radius:999px; background:var(--raised); color:var(--muted); }
.phase-status[data-s="active"] { background:rgba(79,147,230,.14); color:var(--run-ink); }
.phase-status[data-s="done"] { background:var(--ok-bg); color:var(--ok-ink); }
.phase-status[data-s="failed"] { background:var(--risk-bg); color:var(--risk-ink); }
.slices { margin:0.5rem 0 0.1rem; padding-left:0.3rem; display:flex; flex-direction:column; gap:0.3rem; }
.slice { display:flex; align-items:center; gap:0.6rem; font-size:0.86rem; padding:0.3rem 0.4rem; border-radius:8px; }
.slice:hover { background:var(--bg-2); }
.sicon { width:18px; height:18px; flex:none; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:0.7rem; border:1.5px solid var(--muted-2); color:var(--muted-2); }
.slice[data-s="running"] .sicon { border-color:var(--run-ink); color:var(--run-ink); animation:blink 1.1s infinite; }
.slice[data-s="done"] .sicon { border-color:var(--ok-ink); background:var(--ok-ink); color:#06281f; }
.slice[data-s="failed"] .sicon { border-color:var(--risk-ink); background:var(--risk-ink); color:#240606; }
.slice[data-s="blocked"] .sicon { border-color:var(--warn-ink); color:var(--warn-ink); }
.slice .sid { font-family:var(--mono); font-size:0.72rem; color:var(--muted-2); }
.slice .snote { color:var(--muted); font-size:0.78rem; margin-left:auto; font-style:italic; }
.slice[data-s="done"] .sname { color:var(--muted); }

/* Log */
.log { max-height:180px; overflow-y:auto; padding:0.6rem 1rem; font-family:var(--mono); font-size:0.76rem; color:var(--muted); display:flex; flex-direction:column; gap:0.2rem; }
.log .lt { color:var(--muted-2); }
.scroll::-webkit-scrollbar { width:9px; } .scroll::-webkit-scrollbar-thumb { background:var(--raised); border-radius:6px; }

@media (max-width: 720px) { .hero-right { align-items:flex-start; } }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <img id="brandLogo" class="brand-logo" alt="Auxly" />
            <div class="brand-text">
              <div class="brand-mark">Auxly <span>Execute</span></div>
              <div class="brand-meta">
                <span id="runTitle">—</span>
                <span>run: <b id="runId">—</b></span>
              </div>
            </div>
          </div>
          <div class="hero-right">
            <div id="runBadge" class="run-badge" data-status="running"><span class="dot"></span><span id="runStatusText">running</span></div>
            <div id="conn" class="conn" data-ok="0"><span class="dot"></span><span id="connText">connecting…</span></div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-top">
            <span>Progress</span>
            <span><b id="progPct">0%</b> · <span id="progCount">0/0 slices</span></span>
          </div>
          <div class="bar"><span id="progBar"></span></div>
        </div>
      </header>

      <section class="panel" id="agentsPanel" style="display:none">
        <div class="panel-header">
          <h2>Agents &amp; Models</h2>
          <span id="agentsSub" class="panel-sub">—</span>
        </div>
        <div id="agents" class="agents"></div>
      </section>

      <section id="notifsSection" class="notifs">
        <div id="blockers"></div>
        <div id="warnings"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Execution Plan</h2>
          <span id="phasesSub" class="panel-sub">—</span>
        </div>
        <div id="phases" class="phases scroll"></div>
      </section>

      <section class="panel">
        <div class="panel-header"><h2>Activity Log</h2></div>
        <div id="log" class="log scroll"></div>
      </section>
    </div>
    <script src="logo.js"></script>
    <script src="app.js"></script>
  </body>
</html>
