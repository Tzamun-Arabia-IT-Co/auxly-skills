<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auxly Council</title>
    <style>
:root {
  color-scheme: dark;
  /* Auxly brand */
  --teal: #29c2cf;
  --blue: #4f93e6;
  --purple: #8b6fd0;
  --green: #2dd4a7;
  --grad: linear-gradient(120deg, var(--teal) 0%, var(--blue) 48%, var(--purple) 100%);

  /* Dark surfaces */
  --bg: #0c1119;
  --bg-2: #0f1623;
  --panel: #141c2b;
  --panel-2: #1a2335;
  --raised: #202c43;
  --border: #263149;
  --border-soft: #1d2740;
  --ink: #e8eef9;
  --muted: #8a97af;
  --muted-2: #66728a;

  --risk-ink: #ff8585;
  --risk-bg: rgba(255, 99, 99, 0.10);
  --risk-bd: rgba(255, 99, 99, 0.35);
  --pro-ink: #4fe0b6;
  --pro-bg: rgba(45, 212, 167, 0.10);
  --pro-bd: rgba(45, 212, 167, 0.32);
  --con-ink: #f5c069;
  --con-bg: rgba(245, 180, 84, 0.10);
  --con-bd: rgba(245, 180, 84, 0.32);

  --radius: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font);
  color: var(--ink);
  background:
    radial-gradient(900px 500px at 12% -8%, rgba(79, 147, 230, 0.14), transparent 60%),
    radial-gradient(800px 500px at 100% 0%, rgba(139, 111, 208, 0.14), transparent 55%),
    var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app { max-width: 1320px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; display: flex; flex-direction: column; gap: 1.1rem; }

/* ---------- Header ---------- */
.hero {
  position: relative; overflow: hidden;
  border-radius: var(--radius); border: 1px solid var(--border);
  background:
    linear-gradient(120deg, rgba(41,194,207,0.16), rgba(139,111,208,0.16)),
    var(--panel);
  padding: 1.1rem 1.3rem;
  display: flex; flex-direction: column; gap: 0.9rem;
}
.hero::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--grad);
}
.hero-top { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 0.8rem; flex: 1 1 auto; }
.brand-logo {
  width: 50px; height: 50px; border-radius: 13px; flex: none;
  background: radial-gradient(circle at 30% 25%, #fff, #eef3fb); padding: 6px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
}
.brand-text { display: flex; flex-direction: column; gap: 3px; }
.brand-mark { font-size: 1.5rem; font-weight: 750; line-height: 1; letter-spacing: 0.01em; }
.brand-mark span {
  background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-meta { display: flex; gap: 0.7rem; font-size: 0.76rem; color: var(--muted); flex-wrap: wrap; }
.brand-meta b { color: var(--ink); font-weight: 600; }

.hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
.status-pill {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.32rem 0.7rem; border-radius: 999px; border: 1px solid var(--border);
  background: var(--panel-2); color: var(--muted); display: inline-flex; align-items: center; gap: 0.4rem;
}
.status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-2); }
.status-pill[data-tone="connected"] { color: var(--green); border-color: var(--pro-bd); }
.status-pill[data-tone="connected"] .dot { background: var(--green); animation: blink 1.3s ease-in-out infinite; }
@keyframes blink {
  0%, 100% { opacity: 1; box-shadow: 0 0 9px var(--green); }
  50% { opacity: 0.3; box-shadow: 0 0 2px var(--green); }
}
.status-pill[data-tone="reconnecting…"], .status-pill[data-tone="connecting…"] { color: var(--con-ink); }
.status-meta { display: flex; gap: 0.7rem; font-size: 0.72rem; color: var(--muted); }
.status-controls { display: flex; align-items: center; gap: 0.55rem; }
.toggle { display: inline-flex; align-items: center; gap: 0.45rem; cursor: pointer; font-size: 0.74rem; color: var(--muted); }
.toggle input { position: absolute; opacity: 0; }
.toggle-track { width: 34px; height: 18px; border-radius: 999px; background: var(--raised); position: relative; transition: background .2s; }
.toggle-track::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#cfd8e8; transition: transform .2s; }
.toggle input:checked + .toggle-track { background: var(--green); }
.toggle input:checked + .toggle-track::after { transform: translateX(16px); background:#06281f; }
.status-text { font-size: 0.7rem; color: var(--muted); }

/* ---------- Council roster ---------- */
.roster { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; }
.roster-label {
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted-2);
  padding-right: 0.2rem;
}
.mode-badge {
  font-size: 0.64rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.28rem 0.6rem; border-radius: 8px; color: #06281f;
}
.mode-badge[data-mode="claude-only"] { background: linear-gradient(120deg,#f5c069,#e0985a); color:#2a1c08; }
.mode-badge[data-mode="multi-vendor"] { background: var(--grad); color: #04121f; }
.member {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.4rem 0.7rem; border-radius: 11px; border: 1px solid var(--border);
  background: var(--panel-2); font-size: 0.78rem;
}
.member .mdot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted-2); flex: none; }
.member[data-status="running"] .mdot, .member[data-status="retrying"] .mdot { background: var(--blue); animation: pulse 1.1s infinite; }
.member[data-status="complete"] .mdot { background: var(--green); box-shadow: 0 0 7px var(--green); }
.member[data-status="failed"] .mdot { background: var(--risk-ink); }
.member[data-status="needs-fix"] .mdot { background: var(--con-ink); }
.member .mname { font-weight: 650; }
.member .mmodel { color: var(--muted); font-family: var(--mono); font-size: 0.72rem; }
.member .mrole { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-2); border:1px solid var(--border); border-radius:6px; padding: 1px 5px; }
.member.judge { border-color: var(--purple); box-shadow: inset 0 0 0 1px rgba(139,111,208,0.25); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ---------- Task ---------- */
.task { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.95rem 1.2rem; }
.eyebrow { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-2); margin-bottom: 0.4rem; }
.task-brief { margin: 0; font-size: 0.92rem; line-height: 1.5; white-space: pre-wrap; color: var(--ink); }

/* ---------- Grid + panels ---------- */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
.panel-wide { grid-column: 1 / -1; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border-soft); background: var(--panel-2); }
.panel-header h2 { margin: 0; font-size: 0.98rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
.panel-header h2::before { content:''; width: 9px; height: 9px; border-radius: 3px; background: var(--grad); }
.panel-sub { font-size: 0.74rem; color: var(--muted); }
.panel-body { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.8rem; }

.field-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-2); }
.planner-select { width: 100%; padding: 0.55rem 0.7rem; border-radius: 10px; border: 1px solid var(--border); font-size: 0.88rem; background: var(--bg-2); color: var(--ink); }
.detail-meta { display: flex; align-items: center; gap: 0.55rem; }
.detail-id { font-weight: 700; font-size: 0.92rem; }
.status-chip { font-size: 0.64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.22rem 0.55rem; border-radius: 999px; background: var(--raised); color: var(--muted); }
.status-chip[data-tone="complete"] { background: var(--pro-bg); color: var(--pro-ink); border:1px solid var(--pro-bd); }
.status-chip[data-tone="running"], .status-chip[data-tone="retrying"] { background: rgba(79,147,230,.12); color: var(--blue); border:1px solid rgba(79,147,230,.35); }
.status-chip[data-tone="needs-fix"] { background: var(--con-bg); color: var(--con-ink); border:1px solid var(--con-bd); }
.status-chip[data-tone="failed"] { background: var(--risk-bg); color: var(--risk-ink); border:1px solid var(--risk-bd); }

/* ---------- Markdown ---------- */
.markdown-body { font-size: 0.88rem; line-height: 1.55; color: var(--ink); overflow-wrap: anywhere; }
.markdown-body h1 { font-size: 1.1rem; margin: 0.3rem 0 0.5rem; }
.markdown-body h2 { font-size: 0.98rem; margin: 0.9rem 0 0.4rem; padding-bottom: 0.25rem; border-bottom: 1px solid var(--border-soft); }
.markdown-body h3 { font-size: 0.9rem; margin: 0.7rem 0 0.3rem; color: var(--teal); }
.markdown-body h4 { font-size: 0.84rem; margin: 0.5rem 0 0.2rem; color: var(--muted); }
.markdown-body p { margin: 0.4rem 0; }
.markdown-body ul, .markdown-body ol { margin: 0.3rem 0 0.6rem; padding-left: 1.3rem; }
.markdown-body li { margin: 0.16rem 0; }
.markdown-body code { font-family: var(--mono); font-size: 0.8em; background: var(--raised); color: #d7e1f3; padding: 0.06rem 0.34rem; border-radius: 5px; }
.markdown-body pre { background: #080c14; color: #d7e1f3; padding: 0.8rem 1rem; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border-soft); }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body strong { font-weight: 700; color: #fff; }
.markdown-body hr { border: none; border-top: 1px solid var(--border-soft); margin: 0.8rem 0; }
.markdown-body a { color: var(--blue); }
.markdown-body .placeholder { color: var(--muted-2); font-style: italic; }
.scroll-box { max-height: 540px; overflow-y: auto; padding-right: 0.4rem; }
.scroll-box::-webkit-scrollbar { width: 9px; }
.scroll-box::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 6px; }

/* ---------- Insight cards ---------- */
.insight-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
.insight-cards .card.risk { grid-column: 1 / -1; }
.card { border-radius: 12px; padding: 0.65rem 0.8rem; border: 1px solid var(--border); background: var(--panel-2); }
.card-title { font-size: 0.66rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.35rem; }
.card .markdown-body { font-size: 0.82rem; }
.card.risk { background: var(--risk-bg); border-color: var(--risk-bd); }
.card.risk .card-title { color: var(--risk-ink); }
.card.pros { background: var(--pro-bg); border-color: var(--pro-bd); }
.card.pros .card-title { color: var(--pro-ink); }
.card.cons { background: var(--con-bg); border-color: var(--con-bd); }
.card.cons .card-title { color: var(--con-ink); }
.card.empty { display: none; }

.error-list { margin: 0.2rem 0 0; padding-left: 1.1rem; color: var(--risk-ink); font-size: 0.8rem; }
.error-list:empty { display: none; }

/* ---------- Final plan ---------- */
.editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
.editor-pane, .preview-pane { display: flex; flex-direction: column; gap: 0.4rem; }
textarea#finalPlanEditor { width: 100%; min-height: 380px; resize: vertical; font-family: var(--mono); font-size: 0.8rem; line-height: 1.45; padding: 0.8rem; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-2); color: var(--ink); }
#finalPlanPreview { min-height: 380px; }
.action-row { display: grid; grid-template-columns: auto 1fr; gap: 1rem; align-items: start; margin-top: 0.4rem; }
.action-group { display: flex; flex-direction: column; gap: 0.45rem; }
.action-group--actions { flex-direction: row; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.rerun-row { display: flex; gap: 0.5rem; }
.rerun-row textarea { flex: 1; min-height: 64px; border-radius: 10px; border: 1px solid var(--border); padding: 0.5rem 0.65rem; font-family: var(--font); font-size: 0.84rem; background: var(--bg-2); color: var(--ink); }
.btn { border: none; cursor: pointer; font-weight: 700; font-size: 0.84rem; padding: 0.58rem 1.15rem; border-radius: 10px; color: #06121f; transition: transform .05s, filter .15s; }
.btn:active { transform: translateY(1px); }
.btn.primary { background: var(--grad); }
.btn.danger { background: linear-gradient(120deg, #f5b454, #e07a5f); align-self: stretch; color:#2a1404; }
.btn:hover { filter: brightness(1.08); }

@media (max-width: 920px) {
  .grid, .editor-grid, .insight-cards { grid-template-columns: 1fr; }
  .insight-cards .card.risk { grid-column: auto; }
  .action-row { grid-template-columns: 1fr; }
  .hero-right { align-items: flex-start; }
}
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <img id="brandLogo" class="brand-logo" alt="Auxly" />
            <div class="brand-text">
              <div class="brand-mark">Auxly <span>Council</span></div>
              <div class="brand-meta">
                <span>run: <b id="runId">—</b></span>
                <span>phase: <b id="phase">—</b></span>
              </div>
            </div>
          </div>
          <div class="hero-right">
            <div id="connectionStatus" class="status-pill" data-tone="connecting…"><span class="dot"></span>connecting…</div>
            <div class="status-meta">
              <span id="lastUpdated">last update: —</span>
              <span id="sessionCountdown">session: —</span>
            </div>
            <div class="status-controls">
              <label class="toggle">
                <input id="keepOpenToggle" type="checkbox">
                <span class="toggle-track"></span>
                <span class="toggle-label">Keep open</span>
              </label>
              <span id="keepOpenStatus" class="status-text"></span>
            </div>
          </div>
        </div>
        <div class="roster">
          <span class="roster-label">Council</span>
          <span id="councilMode" class="mode-badge" data-mode=""></span>
          <span id="councilRoster" style="display:contents"></span>
        </div>
      </header>

      <section class="task">
        <div class="eyebrow">Task Brief</div>
        <p id="taskBrief" class="task-brief">—</p>
      </section>

      <main class="grid">
        <!-- Planner -->
        <section class="panel">
          <div class="panel-header">
            <h2>Council Member Output</h2>
            <span id="plannerSummary" class="panel-sub">—</span>
          </div>
          <div class="panel-body">
            <label class="field-label" for="plannerSelect">Council member</label>
            <select id="plannerSelect" class="planner-select"></select>
            <div class="detail-meta">
              <div id="plannerId" class="detail-id">—</div>
              <span id="plannerStatus" class="status-chip">—</span>
            </div>
            <div class="insight-cards">
              <div id="plannerRiskCard" class="card risk empty"><div class="card-title">⚠️ Risks &amp; Edge Cases</div><div id="plannerRisks" class="markdown-body"></div></div>
              <div id="plannerProsCard" class="card pros empty"><div class="card-title">✅ Pros</div><div id="plannerPros" class="markdown-body"></div></div>
              <div id="plannerConsCard" class="card cons empty"><div class="card-title">⚖️ Cons</div><div id="plannerCons" class="markdown-body"></div></div>
            </div>
            <label class="field-label">Full plan</label>
            <div id="plannerSummaryText" class="markdown-body scroll-box"><span class="placeholder">—</span></div>
            <ul id="plannerErrors" class="error-list"></ul>
          </div>
        </section>

        <!-- Judge -->
        <section class="panel">
          <div class="panel-header">
            <h2>Judge Output</h2>
            <span id="judgeStatus" class="panel-sub">—</span>
          </div>
          <div class="panel-body">
            <div class="insight-cards">
              <div id="judgeRiskCard" class="card risk empty"><div class="card-title">⚠️ Risks / Gaps</div><div id="judgeRisks" class="markdown-body"></div></div>
              <div id="judgeProsCard" class="card pros empty"><div class="card-title">✅ Pros</div><div id="judgePros" class="markdown-body"></div></div>
              <div id="judgeConsCard" class="card cons empty"><div class="card-title">⚖️ Cons</div><div id="judgeCons" class="markdown-body"></div></div>
            </div>
            <label class="field-label">Full report</label>
            <div id="judgeSummary" class="markdown-body scroll-box"><span class="placeholder">—</span></div>
            <ul id="judgeErrors" class="error-list"></ul>
          </div>
        </section>

        <!-- Final plan -->
        <section class="panel panel-wide">
          <div class="panel-header">
            <h2>Final Plan</h2>
            <span id="finalPlanStatus" class="panel-sub">—</span>
          </div>
          <div class="panel-body">
            <div class="editor-grid">
              <div class="editor-pane">
                <label class="field-label" for="finalPlanEditor">Editor</label>
                <textarea id="finalPlanEditor" spellcheck="false"></textarea>
              </div>
              <div class="preview-pane" id="previewPane">
                <label class="field-label">Preview</label>
                <div id="finalPlanPreview" class="markdown-body scroll-box"><span class="placeholder">—</span></div>
              </div>
            </div>
            <div class="action-row">
              <div class="action-group action-group--actions">
                <button id="acceptBtn" class="btn primary" type="button">Accept</button>
                <button id="saveBtn" class="btn primary" type="button">Save</button>
                <span id="saveStatus" class="status-text"></span>
              </div>
              <div class="action-group">
                <label class="field-label" for="refineContext">Refine Notes</label>
                <div class="rerun-row">
                  <textarea id="refineContext" rows="3" placeholder="Describe what to refine in the plan"></textarea>
                  <button id="refineBtn" class="btn danger" type="button">Refine</button>
                </div>
                <span id="refineStatus" class="status-text"></span>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="logo.js"></script>
    <script src="app.js"></script>
  </body>
</html>
