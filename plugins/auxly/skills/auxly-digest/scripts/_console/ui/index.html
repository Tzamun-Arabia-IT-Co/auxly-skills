<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auxly Console</title>
    <style>
:root {
  color-scheme: dark;
  --teal:#29c2cf; --blue:#4f93e6; --purple:#8b6fd0; --green:#2dd4a7;
  --grad:linear-gradient(120deg,var(--teal) 0%,var(--blue) 48%,var(--purple) 100%);
  --bg:#0c1119; --bg-2:#0f1623; --panel:#141c2b; --panel-2:#1a2335; --raised:#202c43;
  --border:#263149; --border-soft:#1d2740; --ink:#e8eef9; --muted:#8a97af; --muted-2:#66728a;
  --risk-ink:#ff8585; --risk-bg:rgba(255,99,99,.12); --risk-bd:rgba(255,99,99,.4);
  --warn-ink:#f5c069; --warn-bg:rgba(245,180,84,.12); --warn-bd:rgba(245,180,84,.4);
  --ok-ink:#4fe0b6; --ok-bg:rgba(45,212,167,.12); --ok-bd:rgba(45,212,167,.35);
  --run-ink:#6fb0ff;
  --radius:16px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
  background:radial-gradient(900px 500px at 12% -8%,rgba(79,147,230,.14),transparent 60%),
             radial-gradient(800px 500px at 100% 0%,rgba(139,111,208,.14),transparent 55%),var(--bg);}
.app{max-width:1280px;margin:0 auto;padding:1.1rem 1.2rem 3rem;display:flex;flex-direction:column;gap:1rem;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

.hero{position:relative;overflow:hidden;border-radius:var(--radius);border:1px solid var(--border);
  background:linear-gradient(120deg,rgba(41,194,207,.16),rgba(139,111,208,.16)),var(--panel);padding:1rem 1.25rem;
  display:flex;flex-direction:column;gap:.85rem;}
.hero::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--grad);}
.hero-top{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:.8rem;flex:1 1 auto;}
.brand-logo{width:48px;height:48px;border-radius:13px;flex:none;background:radial-gradient(circle at 30% 25%,#fff,#eef3fb);padding:6px;box-shadow:0 6px 18px rgba(0,0,0,.4);}
.brand-mark{font-size:1.45rem;font-weight:750;line-height:1;}
.brand-mark span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.brand-meta{display:flex;gap:.7rem;font-size:.76rem;color:var(--muted);flex-wrap:wrap;margin-top:3px;}
.brand-meta b{color:var(--ink);font-weight:600;}
.hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;}
.run-badge{font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .75rem;border-radius:999px;border:1px solid var(--border);background:var(--panel-2);color:var(--muted);display:inline-flex;align-items:center;gap:.4rem;}
.run-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--muted-2);}
.run-badge[data-status="running"]{color:var(--run-ink);border-color:rgba(79,147,230,.4);}
.run-badge[data-status="running"] .dot{background:var(--run-ink);animation:blink 1.3s infinite;}
.run-badge[data-status="blocked"]{color:var(--risk-ink);border-color:var(--risk-bd);}
.run-badge[data-status="blocked"] .dot{background:var(--risk-ink);animation:blink .8s infinite;}
.run-badge[data-status="complete"]{color:var(--ok-ink);border-color:var(--ok-bd);}
.run-badge[data-status="complete"] .dot{background:var(--ok-ink);}
.run-badge[data-status="failed"]{color:var(--risk-ink);border-color:var(--risk-bd);}
.conn{font-size:.72rem;color:var(--muted);display:inline-flex;align-items:center;gap:.4rem;}
.conn .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);}
.conn[data-ok="1"] .dot{background:var(--green);animation:blink 1.3s infinite;}

.meter{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;font-size:.74rem;color:var(--muted);}
.meter:empty{display:none;}
.meter .chip{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:.25rem .55rem;}
.meter .chip b{color:var(--ink);font-family:var(--mono);}
.meter .cost{color:var(--ok-ink);}

.tabs{display:flex;gap:.4rem;flex-wrap:wrap;}
.tab{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem .85rem;border-radius:11px;border:1px solid var(--border);
  background:var(--panel);color:var(--muted);cursor:pointer;font-size:.84rem;font-weight:600;}
.tab .tdot{width:8px;height:8px;border-radius:50%;background:var(--muted-2);}
.tab[data-status="active"] .tdot,.tab[data-status="running"] .tdot{background:var(--run-ink);animation:blink 1.1s infinite;}
.tab[data-status="done"] .tdot,.tab[data-status="complete"] .tdot,.tab[data-status="pass"] .tdot{background:var(--ok-ink);}
.tab[data-status="failed"] .tdot{background:var(--risk-ink);}
.tab.sel{color:var(--ink);border-color:var(--blue);box-shadow:inset 0 0 0 1px rgba(79,147,230,.3);background:var(--panel-2);}

.actions{display:flex;gap:.5rem;flex-wrap:wrap;}.actions:empty{display:none;}
.btn{border:none;cursor:pointer;font-weight:700;font-size:.8rem;padding:.5rem 1rem;border-radius:10px;color:#06121f;}
.btn.primary{background:var(--grad);}
.btn.resolve{background:linear-gradient(120deg,#ff8585,#e0985a);color:#240606;}
.btn.dismiss{background:var(--raised);color:var(--ink);border:1px solid var(--border);}
.btn:hover{filter:brightness(1.08);}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.panel-header{padding:.8rem 1.05rem;border-bottom:1px solid var(--border-soft);background:var(--panel-2);display:flex;justify-content:space-between;align-items:center;}
.panel-header h2{margin:0;font-size:.96rem;font-weight:700;display:flex;align-items:center;gap:.5rem;}
.panel-header h2::before{content:'';width:9px;height:9px;border-radius:3px;background:var(--grad);}
.panel-sub{font-size:.74rem;color:var(--muted);}
.panel-body{padding:.95rem 1.05rem;display:flex;flex-direction:column;gap:.75rem;}

.notif{border-radius:13px;border:1px solid var(--border);padding:.8rem .95rem;margin-bottom:.6rem;}
.notif .nh{display:flex;align-items:center;gap:.5rem;}
.ntag{font-size:.6rem;font-weight:850;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .5rem;border-radius:7px;}
.nsubj{font-weight:700;font-size:.92rem;}
.ndet{color:var(--muted);font-size:.83rem;margin-top:.3rem;}
.nslice{font-family:var(--mono);font-size:.7rem;color:var(--muted-2);}
.notif.blocker{background:var(--risk-bg);border-color:var(--risk-bd);}.notif.blocker .ntag{background:var(--risk-ink);color:#240606;}.notif.blocker .nsubj{color:var(--risk-ink);}
.notif.warning{background:var(--warn-bg);border-color:var(--warn-bd);}.notif.warning .ntag{background:var(--warn-ink);color:#2a1c04;}.notif.warning .nsubj{color:var(--warn-ink);}
.notif.blocker.resolved{opacity:.85;background:rgba(45,212,167,.07);border-color:rgba(45,212,167,.3);}
.notif.blocker.resolved .ntag{background:rgba(45,212,167,.85);color:#04231a;}
.notif.resolved{opacity:.7;}
.rrow{display:flex;gap:.5rem;margin-top:.55rem;}
.rrow textarea{flex:1;min-height:40px;resize:vertical;border-radius:9px;border:1px solid var(--risk-bd);background:var(--bg-2);color:var(--ink);padding:.45rem .6rem;font-family:var(--font);font-size:.85rem;}
.rnote{margin-top:.45rem;font-size:.8rem;color:var(--ok-ink);}

.agents{display:flex;flex-wrap:wrap;gap:.55rem;}
.agent{display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;border-radius:11px;border:1px solid var(--border);background:var(--panel-2);min-width:190px;}
.agent .adot{width:9px;height:9px;border-radius:50%;background:var(--muted-2);flex:none;}
.agent[data-status="active"]{border-color:rgba(45,212,167,.4);}
.agent[data-status="active"] .adot{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.1s infinite;}
.agent[data-status="done"] .adot{background:var(--blue);}
.amain{display:flex;flex-direction:column;gap:1px;min-width:0;}
.aname{font-weight:650;font-size:.84rem;}.amodel{font-family:var(--mono);font-size:.7rem;color:var(--muted);}.acur{font-family:var(--mono);font-size:.7rem;color:var(--run-ink);}
.ameta{display:flex;align-items:center;gap:.35rem;margin-left:auto;}
.atag{font-size:.56rem;font-weight:850;text-transform:uppercase;letter-spacing:.05em;padding:.16rem .42rem;border-radius:6px;}
.atag.active{background:var(--ok-bg);color:var(--ok-ink);border:1px solid var(--ok-bd);}.atag.idle{background:var(--raised);color:var(--muted);}.atag.done{background:rgba(79,147,230,.12);color:var(--run-ink);}
.arole{font-size:.56rem;text-transform:uppercase;color:var(--muted-2);border:1px solid var(--border);border-radius:6px;padding:1px 5px;}

.bar{height:11px;border-radius:999px;background:var(--bg-2);border:1px solid var(--border);overflow:hidden;}
.bar>span{display:block;height:100%;width:0;background:var(--grad);transition:width .4s;}
.prow{display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);margin-bottom:.35rem;}.prow b{color:var(--ink);}

.phase{padding:.6rem .55rem;border-bottom:1px solid var(--border-soft);}.phase:last-child{border-bottom:none;}
.phead{display:flex;align-items:center;gap:.55rem;}.pname{font-weight:700;font-size:.9rem;}
.pid{font-family:var(--mono);font-size:.7rem;color:var(--muted-2);border:1px solid var(--border);border-radius:6px;padding:1px 6px;}
.pstat{margin-left:auto;font-size:.6rem;font-weight:800;text-transform:uppercase;padding:.16rem .48rem;border-radius:999px;background:var(--raised);color:var(--muted);}
.pstat[data-s="active"]{background:rgba(79,147,230,.14);color:var(--run-ink);}.pstat[data-s="done"]{background:var(--ok-bg);color:var(--ok-ink);}.pstat[data-s="failed"]{background:var(--risk-bg);color:var(--risk-ink);}
.slices{margin:.45rem 0 .1rem;display:flex;flex-direction:column;gap:.28rem;}
.slice{display:flex;align-items:center;gap:.55rem;font-size:.85rem;padding:.28rem .4rem;border-radius:8px;}.slice:hover{background:var(--bg-2);}
.sic{width:18px;height:18px;flex:none;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.66rem;border:1.5px solid var(--muted-2);color:var(--muted-2);}
.slice[data-s="running"] .sic{border-color:var(--run-ink);color:var(--run-ink);animation:blink 1.1s infinite;}
.slice[data-s="done"] .sic{border-color:var(--ok-ink);background:var(--ok-ink);color:#06281f;}
.slice[data-s="failed"] .sic{border-color:var(--risk-ink);background:var(--risk-ink);color:#240606;}
.slice[data-s="blocked"] .sic{border-color:var(--warn-ink);color:var(--warn-ink);}
.sid{font-family:var(--mono);font-size:.7rem;color:var(--muted-2);}.snote{color:var(--muted);font-size:.77rem;margin-left:auto;font-style:italic;}
.slice[data-s="done"] .sname{color:var(--muted);}

.checks{display:flex;flex-direction:column;gap:.4rem;}
.check{display:flex;align-items:center;gap:.55rem;padding:.45rem .6rem;border-radius:9px;border:1px solid var(--border);background:var(--panel-2);}
.cic{width:18px;height:18px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;border:1.5px solid var(--muted-2);color:var(--muted-2);flex:none;}
.check[data-s="running"] .cic{border-color:var(--run-ink);color:var(--run-ink);animation:blink 1.1s infinite;}
.check[data-s="pass"] .cic{border-color:var(--ok-ink);background:var(--ok-ink);color:#06281f;}
.check[data-s="fail"] .cic{border-color:var(--risk-ink);background:var(--risk-ink);color:#240606;}
.cname{font-weight:600;font-size:.86rem;}.cout{margin-left:auto;font-family:var(--mono);font-size:.72rem;color:var(--muted);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.finding{border:1px solid var(--border);border-radius:11px;padding:.65rem .8rem;background:var(--panel-2);margin-bottom:.5rem;}
.fhead{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.sev{font-size:.58rem;font-weight:850;text-transform:uppercase;letter-spacing:.05em;padding:.16rem .45rem;border-radius:6px;}
.sev.critical,.sev.high{background:var(--risk-bg);color:var(--risk-ink);border:1px solid var(--risk-bd);}
.sev.medium{background:var(--warn-bg);color:var(--warn-ink);border:1px solid var(--warn-bd);}
.sev.low,.sev.info{background:var(--raised);color:var(--muted);}
.floc{font-family:var(--mono);font-size:.7rem;color:var(--muted-2);}.ftitle{font-weight:700;font-size:.9rem;}.fdet{color:var(--muted);font-size:.83rem;margin-top:.3rem;}
.verdict{font-size:.58rem;font-weight:800;text-transform:uppercase;padding:.16rem .45rem;border-radius:6px;margin-left:auto;}
.verdict.confirmed{background:var(--risk-bg);color:var(--risk-ink);}.verdict.rejected{background:var(--ok-bg);color:var(--ok-ink);}.verdict.unsure{background:var(--warn-bg);color:var(--warn-ink);}

.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.7rem;}
.run-card{border:1px solid var(--border);border-radius:12px;padding:.7rem .8rem;background:var(--panel-2);display:flex;flex-direction:column;gap:.3rem;}
.run-card .rt{font-weight:700;font-size:.88rem;}.run-card .rm{font-size:.72rem;color:var(--muted);}.run-card .rk{font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2);}

.md{font-size:.88rem;line-height:1.55;color:var(--ink);overflow-wrap:anywhere;}
.md h1{font-size:1.1rem;margin:.3rem 0 .5rem;}.md h2{font-size:.98rem;margin:.9rem 0 .4rem;padding-bottom:.25rem;border-bottom:1px solid var(--border-soft);}
.md h3{font-size:.9rem;margin:.7rem 0 .3rem;color:var(--teal);}.md h4{font-size:.84rem;margin:.5rem 0 .2rem;color:var(--muted);}
.md p{margin:.4rem 0;}.md ul,.md ol{margin:.3rem 0 .6rem;padding-left:1.3rem;}.md li{margin:.15rem 0;}
.md code{font-family:var(--mono);font-size:.8em;background:var(--raised);color:#d7e1f3;padding:.06rem .34rem;border-radius:5px;}
.md pre{background:#080c14;color:#d7e1f3;padding:.8rem 1rem;border-radius:10px;overflow-x:auto;border:1px solid var(--border-soft);}
.md pre code{background:none;padding:0;}.md strong{font-weight:700;color:#fff;}.md hr{border:none;border-top:1px solid var(--border-soft);margin:.8rem 0;}
.placeholder{color:var(--muted-2);font-style:italic;}
.scroll{max-height:560px;overflow-y:auto;padding-right:.4rem;}.scroll::-webkit-scrollbar{width:9px;}.scroll::-webkit-scrollbar-thumb{background:var(--raised);border-radius:6px;}
.log{max-height:170px;overflow-y:auto;padding:.5rem .9rem;font-family:var(--mono);font-size:.74rem;color:var(--muted);display:flex;flex-direction:column;gap:.18rem;}
.log .lt{color:var(--muted-2);}
.hidden{display:none;}
/* ---- rich Plan stage (matches the council) ---- */
.roster-line{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:.7rem;}
.rchip{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .6rem;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);font-size:.76rem;}
.rchip .rk{color:var(--teal);} .rchip .rmodel{font-family:var(--mono);font-size:.7rem;color:var(--muted);} .rchip .rrole{font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--purple);border:1px solid var(--border);border-radius:5px;padding:0 4px;}
.insight-cards{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.8rem;}
.insight-cards .card.risk{grid-column:1 / -1;}
.card{border-radius:12px;padding:.65rem .8rem;border:1px solid var(--border);background:var(--panel-2);}
.card-title{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;}
.card .md{font-size:.82rem;}
.card.risk{background:var(--risk-bg);border-color:var(--risk-bd);}.card.risk .card-title{color:var(--risk-ink);}
.card.pros{background:rgba(45,212,167,.1);border-color:rgba(45,212,167,.32);}.card.pros .card-title{color:#4fe0b6;}
.card.cons{background:rgba(245,180,84,.1);border-color:rgba(245,180,84,.32);}.card.cons .card-title{color:#f5c069;}
.plan-toolbar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.6rem;}
.plan-search{flex:1;min-width:140px;background:var(--bg-2);border:1px solid var(--border);color:var(--ink);border-radius:8px;padding:.4rem .6rem;font-size:.8rem;}
.plan-search:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,147,230,.16);}
.ghost-btn{cursor:pointer;border:1px solid var(--border);background:var(--panel-2);color:var(--ink);border-radius:8px;font-size:.74rem;padding:.4rem .7rem;}
.ghost-btn:hover{border-color:var(--teal);color:var(--teal);}
mark{background:rgba(245,200,105,.4);color:#fff;border-radius:3px;padding:0 2px;}
.md-section>h2{cursor:pointer;user-select:none;display:flex;align-items:center;gap:.4rem;}
.md-section>h2::after{content:'▾';font-size:.7rem;color:var(--muted-2);margin-left:auto;transition:transform .2s;}
.md-section.collapsed>h2::after{transform:rotate(-90deg);}
.md-section.collapsed>:not(h2){display:none;}
.toast-wrap{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:.5rem;z-index:50;}
.toast{min-width:200px;max-width:340px;padding:.7rem .9rem;border-radius:12px;border:1px solid var(--border);background:var(--panel-2);color:var(--ink);font-size:.82rem;box-shadow:0 14px 40px -16px rgba(0,0,0,.8);opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;display:flex;gap:.55rem;align-items:flex-start;}
.toast.show{opacity:1;transform:none;}
.toast::before{content:'';width:4px;align-self:stretch;border-radius:3px;background:var(--blue);flex:none;}
.toast.success::before{background:var(--green);}.toast.error::before{background:var(--risk-ink);}
/* single Next button + completion message */
.actions{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.flow-msg{font-size:.8rem;font-weight:600;}
.flow-msg.ok{color:var(--green,#2dd4a7);}
.btn.next.ready{animation:nextpulse 1.2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(45,212,167,.55);}
.btn.next:not(.ready){opacity:.85;}
@keyframes nextpulse{0%{box-shadow:0 0 0 0 rgba(45,212,167,.55);}70%{box-shadow:0 0 0 10px rgba(45,212,167,0);}100%{box-shadow:0 0 0 0 rgba(45,212,167,0);}}
/* waiting-for-orchestrator guide (execute tab, before anything runs) */
.orchwait{border:1px solid rgba(124,131,253,.45);background:rgba(124,131,253,.10);border-radius:12px;padding:.7rem .85rem;margin-bottom:.8rem;animation:owpulse 2s ease-in-out infinite;}
.orchwait .ow-h{font-weight:700;font-size:.85rem;color:#a9b0ff;margin-bottom:.3rem;}
.orchwait .ow-b{font-size:.78rem;color:var(--muted);line-height:1.5;}
.orchwait code{background:rgba(124,131,253,.18);padding:.05rem .35rem;border-radius:5px;font-size:.74rem;color:#cfd3ff;}
@keyframes owpulse{0%,100%{border-color:rgba(124,131,253,.30);}50%{border-color:rgba(124,131,253,.7);}}
/* always-visible blockers / warnings status */
.hrow{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;justify-content:space-between;}
.status-pills{display:flex;gap:.5rem;flex-wrap:wrap;}
.spill{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:700;padding:.28rem .6rem;border-radius:999px;border:1px solid var(--border);background:var(--panel-2);color:var(--muted);}
.spill .si{font-size:.8rem;line-height:1;}
.spill.ok{color:var(--green,#2dd4a7);border-color:rgba(45,212,167,.35);}
.spill.block{color:var(--risk-ink);border-color:var(--risk-bd);background:var(--risk-bg);animation:blink 1s infinite;}
.spill.warn{color:#f5c069;border-color:rgba(245,180,84,.4);background:rgba(245,180,84,.1);}
@media (max-width:820px){.hero-right{align-items:flex-start;}.insight-cards{grid-template-columns:1fr;}.hrow{flex-direction:column;align-items:flex-start;}}
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <img id="brandLogo" class="brand-logo" alt="Auxly" />
            <div>
              <div class="brand-mark">Auxly <span>Console</span></div>
              <div class="brand-meta"><span id="runTitle">—</span><span>run: <b id="runId">—</b></span></div>
            </div>
          </div>
          <div class="hero-right">
            <div id="runBadge" class="run-badge" data-status="running"><span class="dot"></span><span id="runStatusText">running</span></div>
            <div id="conn" class="conn" data-ok="0"><span class="dot"></span><span id="connText">connecting…</span></div>
          </div>
        </div>
